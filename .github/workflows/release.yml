name: BUT Network - Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd but-wallet
          flutter pub get

      - name: Build Release APK
        run: |
          cd but-wallet
          flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: |
          cd but-wallet
          flutter build appbundle --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: BUT Wallet ${{ github.ref_name }}
          body: |
            # 🚀 BUT Network Wallet - ${{ github.ref_name }}
            
            ## What's New:
            - ✅ CKS-512 & CKS-1024 Quantum Security
            - ✅ Swap, Staking, NFT Support
            - ✅ Cross-chain Bridge
            - ✅ Hardware Wallet Support
            - ✅ Multi-language (Hindi, English, Spanish, Arabic)
            - ✅ Social Recovery
            - ✅ but:// Username System
            
            ## Downloads:
            - APK for Android
            - Coming soon to F-Droid
            
            ## Verify:
            ```bash
            sha256sum but-wallet-*.apk
            ```
          files: |
            but-wallet/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            but-wallet/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            but-wallet/build/app/outputs/flutter-apk/app-x86_64-release.apk
            but-wallet/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
